# Window
background_opacity 0.78
dynamic_background_opacity yes
background_blur 32
window_padding_width 10
window_margin_width 3
single_window_margin_width 3
placement_strategy center
remember_window_size yes
initial_window_width 110c
initial_window_height 32c
confirm_os_window_close 0

# Font rendering
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5
disable_ligatures never
text_composition_strategy 1.0 0
adjust_line_height 102%
adjust_column_width 100%

# Cursor
cursor_shape beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.55
cursor_stop_blinking_after 15.0

# Tabs
tab_bar_edge top
tab_bar_style separator
tab_bar_min_tabs 2
tab_title_template " {index} {title} "
active_tab_font_style bold
inactive_tab_font_style normal

# UI
enable_audio_bell no
visual_bell_duration 0.08
copy_on_select clipboard
strip_trailing_spaces smart
mouse_hide_wait 2.0
url_style curly

# Theme: matte black with green accents and red input text
foreground #ff6b7a
background #050806
selection_foreground #050806
selection_background #39ff88

cursor #39ff88
cursor_text_color #050806

active_border_color #39ff88
inactive_border_color #102016
bell_border_color #8cffb0

active_tab_foreground #050806
active_tab_background #39ff88
inactive_tab_foreground #6bbf80
inactive_tab_background #07100a
tab_bar_background #030503

mark1_foreground #050806
mark1_background #39ff88
mark2_foreground #050806
mark2_background #8cffb0
mark3_foreground #050806
mark3_background #c6ffd3

# ANSI colors
color0  #07100a
color1  #ff6b7a
color2  #39ff88
color3  #d7ff6b
color4  #74a7ff
color5  #d787ff
color6  #63ffd8
color7  #ffccd2
color8  #24402c
color9  #ff8b98
color10 #8cffb0
color11 #e4ff91
color12 #9bc1ff
color13 #e0a6ff
color14 #95ffe5
color15 #ffffff
